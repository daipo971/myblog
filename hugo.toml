title = "欣淇AI网 - AI工具教程与免费资源"
baseURL = "https://xinqiai.dpdns.org"
locale = "zh-cn"
theme = "PaperMod"

[params]
  defaultTheme = "dark"
  disableThemeToggle = false
  env = "production"

  # SEO
  [params.analytics.google]
    SiteVerificationTag = "googlee78fbd130bd563d5"
  [params.analytics.bing]
    SiteVerificationTag = "F7ED783B3CF5AA4252FD5454135D5D82"

  # 首页
  [params.homeInfoParams]
    title = "欣淇AI网"
    content = "探索人工智能的无限可能。分享 AI 工具评测、免费资源教程与实战技巧。\n\n🎯 **AI 工具评测** · 💰 **免费资源** · 🔧 **实战教程**"

  # 页脚
  [params.footer]
    hideCopyright = false
    text = "探索 · 创新 · 赚钱"

  # 联系
  [params.contact]
    email = "daipo971@outlook.com"

  # 文章默认配置
  [params.assets]
    disableFingerprinting = false

  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "permalink", "summary", "content"]

[menu]
  [[menu.main]]
    identifier = "home"
    name = "首页"
    url = "/"
    weight = 10

  [[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 20

  [[menu.main]]
    identifier = "tools"
    name = "推荐工具"
    url = "/tools/"
    weight = 25

  [[menu.main]]
    identifier = "archives"
    name = "归档"
    url = "/archives/"
    weight = 30

  [[menu.main]]
    identifier = "search"
    name = "搜索"
    url = "/search/"
    weight = 40
