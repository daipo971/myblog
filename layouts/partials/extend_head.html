{{- /* Google Fonts: Outfit + JetBrains Mono + Noto Sans SC */}}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* ============================================
   欣淇AI网站 — 科技背景视觉系统
   Cyber Background & Glassmorphism
   ============================================ */

/* ---------- CSS 变量 ---------- */
:root {
  --cyber-bg-1: #0a0a12;
  --cyber-bg-2: #0d0d1a;
  --cyber-accent: #00d4ff;
  --cyber-accent2: #7c3aed;
  --cyber-accent3: #00ff88;
  --cyber-glow: rgba(0,212,255,0.15);
  --glass-bg: rgba(255,255,255,0.04);
  --glass-border: rgba(0,212,255,0.08);
  --glass-blur: 12px;
}

[data-theme="dark"] {
  --cyber-bg-1: #080810;
  --cyber-bg-2: #0b0b18;
  --glass-bg: rgba(255,255,255,0.04);
  --glass-border: rgba(0,212,255,0.08);
}

/* ---------- 整体背景 ---------- */
body {
  background: linear-gradient(135deg, var(--cyber-bg-1) 0%, var(--cyber-bg-2) 50%, #0f0a1a 100%) !important;
  background-attachment: fixed !important;
}

/* ---------- 网格覆盖 ---------- */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background-image:
    linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: -1;
}

/* ---------- 扫描线 ---------- */
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,212,255,0.008) 2px,
    rgba(0,212,255,0.008) 4px
  );
  pointer-events: none;
  z-index: -1;
}

/* ---------- 导航栏 ---------- */
.header {
  background: rgba(10,10,18,0.7) !important;
  backdrop-filter: blur(var(--glass-blur)) !important;
  -webkit-backdrop-filter: blur(var(--glass-blur)) !important;
  border-bottom: 1px solid var(--glass-border) !important;
}

.logo a {
  background: linear-gradient(135deg, var(--cyber-accent), var(--cyber-accent2), var(--cyber-accent3));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-weight: 800 !important;
  letter-spacing: 0.5px;
}

.logo a::after {
  content: '';
  display: block;
  height: 2px;
  background: linear-gradient(90deg, var(--cyber-accent), var(--cyber-accent2));
  border-radius: 2px;
  margin-top: 2px;
  animation: logoGlow 3s ease-in-out infinite alternate;
}

@keyframes logoGlow {
  0% { opacity: 0.4; width: 60%; }
  100% { opacity: 1; width: 100%; }
}

/* ---------- 菜单链接 ---------- */
.menu a {
  position: relative;
  color: var(--secondary) !important;
  transition: color 0.3s ease !important;
}

.menu a::before {
  content: '';
  position: absolute;
  bottom: 2px;
  left: 0;
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg, var(--cyber-accent), var(--cyber-accent2));
  transform: scaleX(0);
  transform-origin: right;
  transition: transform 0.4s ease;
}

.menu a:hover {
  color: var(--cyber-accent) !important;
}

.menu a:hover::before {
  transform: scaleX(1);
  transform-origin: left;
}

.menu .active {
  color: var(--cyber-accent) !important;
  text-decoration: none !important;
}

.menu .active::before {
  transform: scaleX(1);
}

/* ---------- 主题切换 ---------- */
.theme-toggle {
  color: var(--secondary) !important;
  transition: all 0.3s ease !important;
}

.theme-toggle:hover {
  color: var(--cyber-accent) !important;
  text-shadow: 0 0 12px var(--cyber-glow);
}

/* ---------- 首页区域 ---------- */
.home-info {
  position: relative;
  border: none !important;
  background: var(--glass-bg) !important;
  backdrop-filter: blur(var(--glass-blur)) !important;
  -webkit-backdrop-filter: blur(var(--glass-blur)) !important;
  border-radius: 16px !important;
  padding: 40px var(--gap) !important;
  box-shadow:
    0 0 30px rgba(0,212,255,0.03),
    inset 0 1px 0 rgba(0,212,255,0.06);
  transition: all 0.4s ease;
}

.home-info::before {
  content: '';
  position: absolute;
  top: -1px; left: -1px; right: -1px; bottom: -1px;
  border-radius: 17px;
  background: linear-gradient(135deg, rgba(0,212,255,0.15), transparent 40%, transparent 60%, rgba(124,58,237,0.15));
  z-index: -1;
  opacity: 0.6;
  transition: opacity 0.4s ease;
}

.home-info:hover::before {
  opacity: 1;
}

.home-info .entry-header h1 {
  background: linear-gradient(135deg, var(--cyber-accent), var(--cyber-accent2), var(--cyber-accent3));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-size: 40px !important;
  letter-spacing: 1px;
  line-height: 1.2 !important;
}

.home-info .entry-content {
  color: rgba(196,196,197,0.85) !important;
  font-size: 16px !important;
  line-height: 1.8 !important;
}

/* ---------- 联系卡片 ---------- */
.home-contact-card {
  background: rgba(0,212,255,0.04) !important;
  border: 1px solid rgba(0,212,255,0.1) !important;
  backdrop-filter: blur(8px) !important;
  -webkit-backdrop-filter: blur(8px) !important;
  transition: all 0.3s ease !important;
}

.home-contact-card:hover {
  background: rgba(0,212,255,0.08) !important;
  border-color: rgba(0,212,255,0.25) !important;
  box-shadow: 0 0 25px rgba(0,212,255,0.1), inset 0 0 25px rgba(0,212,255,0.03) !important;
}

/* ---------- 文章卡片 ---------- */
.post-entry {
  background: var(--glass-bg) !important;
  backdrop-filter: blur(8px) !important;
  -webkit-backdrop-filter: blur(8px) !important;
  border: 1px solid var(--glass-border) !important;
  border-radius: 12px !important;
  transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94) !important;
  position: relative;
  overflow: hidden;
}

.post-entry::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(0,212,255,0.03), transparent);
  transition: left 0.6s ease;
}

.post-entry:hover {
  transform: translateY(-3px) !important;
  border-color: rgba(0,212,255,0.2) !important;
  box-shadow:
    0 8px 32px rgba(0,212,255,0.08),
    0 0 60px rgba(0,212,255,0.02) !important;
}

.post-entry:hover::before {
  left: 100%;
}

.entry-header h2 a {
  color: var(--primary) !important;
  transition: color 0.3s ease;
}

.post-entry:hover .entry-header h2 a {
  color: var(--cyber-accent) !important;
}

.entry-content {
  color: var(--secondary) !important;
}

/* ---------- 标签 ---------- */
.tags-list a, .terms-tags a, .tag a, .post-tags a {
  background: rgba(0,212,255,0.05) !important;
  border: 1px solid rgba(0,212,255,0.08) !important;
  border-radius: 6px !important;
  transition: all 0.3s ease !important;
  padding: 2px 10px !important;
}

.tags-list a:hover, .terms-tags a:hover, .tag a:hover, .post-tags a:hover {
  background: rgba(0,212,255,0.1) !important;
  border-color: rgba(0,212,255,0.25) !important;
  box-shadow: 0 0 15px rgba(0,212,255,0.06) !important;
  transform: translateY(-1px);
}

/* ---------- 分页 ---------- */
.page-link {
  background: var(--glass-bg) !important;
  border: 1px solid var(--glass-border) !important;
  backdrop-filter: blur(6px) !important;
  -webkit-backdrop-filter: blur(6px) !important;
  transition: all 0.3s ease !important;
}

.page-link:hover {
  background: rgba(0,212,255,0.08) !important;
  border-color: rgba(0,212,255,0.2) !important;
  box-shadow: 0 0 12px rgba(0,212,255,0.05);
}

.current .page-link {
  background: rgba(0,212,255,0.12) !important;
  border-color: rgba(0,212,255,0.3) !important;
  color: var(--cyber-accent) !important;
}

/* ---------- 页脚 ---------- */
.footer {
  background: rgba(10,10,18,0.6) !important;
  backdrop-filter: blur(var(--glass-blur)) !important;
  -webkit-backdrop-filter: blur(var(--glass-blur)) !important;
  border-top: 1px solid var(--glass-border) !important;
}

.footer a:hover {
  color: var(--cyber-accent) !important;
  text-shadow: 0 0 10px rgba(0,212,255,0.2);
}

/* ---------- 回到顶部 ---------- */
.top-link {
  background: var(--glass-bg) !important;
  border: 1px solid var(--glass-border) !important;
  backdrop-filter: blur(8px) !important;
  -webkit-backdrop-filter: blur(8px) !important;
  transition: all 0.3s ease !important;
}

.top-link:hover {
  background: rgba(0,212,255,0.1) !important;
  border-color: rgba(0,212,255,0.3) !important;
  box-shadow: 0 0 20px rgba(0,212,255,0.1);
  transform: translateY(-3px);
}

/* ---------- 搜索 ---------- */
.search-form input {
  background: var(--glass-bg) !important;
  border: 1px solid var(--glass-border) !important;
  backdrop-filter: blur(8px) !important;
  -webkit-backdrop-filter: blur(8px) !important;
  transition: all 0.3s ease !important;
  color: var(--primary) !important;
}

.search-form input:focus {
  border-color: rgba(0,212,255,0.3) !important;
  box-shadow: 0 0 20px rgba(0,212,255,0.06);
}

.searchResults .focus, .searchResults li:active {
  background: rgba(0,212,255,0.08) !important;
  border-color: rgba(0,212,255,0.2) !important;
}

/* ---------- 代码块 ---------- */
pre, .chroma {
  border-radius: 10px !important;
  border: 1px solid rgba(0,212,255,0.06) !important;
}

/* ---------- 滚动条美化 ---------- */
::-webkit-scrollbar {
  width: 6px;
  height: 6px;
}

::-webkit-scrollbar-track {
  background: var(--cyber-bg-1);
}

::-webkit-scrollbar-thumb {
  background: rgba(0,212,255,0.15);
  border-radius: 3px;
  transition: background 0.3s ease;
}

::-webkit-scrollbar-thumb:hover {
  background: rgba(0,212,255,0.3);
}

/* ========== 手机端适配 ========== */
@media screen and (max-width: 768px) {
  .home-info {
    padding: 28px 16px !important;
    border-radius: 12px !important;
    backdrop-filter: blur(6px) !important;
    -webkit-backdrop-filter: blur(6px) !important;
  }

  .home-info .entry-header h1 {
    font-size: 28px !important;
  }

  .home-info .entry-content {
    font-size: 15px !important;
  }

  .post-entry {
    backdrop-filter: blur(6px) !important;
    -webkit-backdrop-filter: blur(6px) !important;
    padding: 16px !important;
  }

  .header {
    backdrop-filter: blur(8px) !important;
    -webkit-backdrop-filter: blur(8px) !important;
  }

  .footer {
    backdrop-filter: blur(8px) !important;
    -webkit-backdrop-filter: blur(8px) !important;
  }

  body::before {
    background-size: 40px 40px;
  }
}

@media screen and (max-width: 480px) {
  :root {
    --glass-blur: 8px;
  }

  .logo a {
    font-size: 20px !important;
  }

  .home-info .entry-header h1 {
    font-size: 24px !important;
  }
}

/* ---------- 减轻动画偏好 ---------- */
@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}
</style>

{{- /* 神经网络粒子背景动画 */}}
<script>
(function() {
  'use strict';

  var isMobile = window.innerWidth < 768;
  var isReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (isReduced) return;

  var canvas = document.createElement('canvas');
  canvas.id = 'cyber-particles';
  canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:-1;';
  document.body.appendChild(canvas);

  var ctx = canvas.getContext('2d');
  var W, H, particles = [];
  var mouse = { x: -1000, y: -1000 };
  var mouseTimer = null;

  var PARTICLE_COUNT = isMobile ? 40 : 80;
  var CONNECT_DIST = isMobile ? 120 : 150;
  var MOUSE_RADIUS = isMobile ? 100 : 150;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    initParticles();
  }

  function initParticles() {
    particles = [];
    for (var i = 0; i < PARTICLE_COUNT; i++) {
      particles.push({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: (Math.random() - 0.5) * 0.5,
        vy: (Math.random() - 0.5) * 0.5,
        r: Math.random() * 2 + 1,
        alpha: Math.random() * 0.5 + 0.2
      });
    }
  }

  function drawParticles() {
    ctx.clearRect(0, 0, W, H);

    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];

      p.x += p.vx;
      p.y += p.vy;

      if (p.x < -20) p.x = W + 20;
      if (p.x > W + 20) p.x = -20;
      if (p.y < -20) p.y = H + 20;
      if (p.y > H + 20) p.y = -20;

      // glow
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      var gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 3);
      gradient.addColorStop(0, 'rgba(0, 212, 255, ' + p.alpha + ')');
      gradient.addColorStop(1, 'rgba(0, 212, 255, 0)');
      ctx.fillStyle = gradient;
      ctx.fill();

      // core
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * 0.4, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0, 212, 255, ' + (p.alpha * 0.8) + ')';
      ctx.fill();

      // connect
      for (var j = i + 1; j < particles.length; j++) {
        var p2 = particles[j];
        var dx = p.x - p2.x;
        var dy = p.y - p2.y;
        var dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < CONNECT_DIST) {
          var alpha = (1 - dist / CONNECT_DIST) * 0.3;
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(p2.x, p2.y);
          ctx.strokeStyle = 'rgba(0, 212, 255, ' + alpha + ')';
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }

      // mouse
      var mdx = p.x - mouse.x;
      var mdy = p.y - mouse.y;
      var mdist = Math.sqrt(mdx * mdx + mdy * mdy);
      if (mdist < MOUSE_RADIUS) {
        var mAlpha = (1 - mdist / MOUSE_RADIUS) * 0.5;
        ctx.beginPath();
        ctx.moveTo(mouse.x, mouse.y);
        ctx.lineTo(p.x, p.y);
        ctx.strokeStyle = 'rgba(124, 58, 237, ' + mAlpha + ')';
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }

    requestAnimationFrame(drawParticles);
  }

  function onMouseMove(e) {
    if (mouseTimer) return;
    mouseTimer = setTimeout(function() {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
      mouseTimer = null;
    }, 16);
  }

  function onTouchMove(e) {
    var touch = e.touches[0];
    if (touch) {
      mouse.x = touch.clientX;
      mouse.y = touch.clientY;
    }
  }

  function onMouseLeave() {
    mouse.x = -1000;
    mouse.y = -1000;
  }

  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseleave', onMouseLeave);
  document.addEventListener('touchmove', onTouchMove, { passive: true });
  document.addEventListener('touchend', onMouseLeave);

  resize();
  window.addEventListener('resize', resize);
  drawParticles();
})();
</script>
